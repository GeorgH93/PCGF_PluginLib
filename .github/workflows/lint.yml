name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint (Checkstyle + PMD)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Checkstyle
        run: |
          mvn -B checkstyle:check \
            -Dcheckstyle.output.format=xml \
            -Dcheckstyle.output.encoding=UTF-8 \
            || true
        continue-on-error: true

      - name: Run PMD
        run: |
          mvn -B pmd:pmd \
            -Dformat=xml \
            || true
        continue-on-error: true

      - name: Checkstyle with reviewdog (new code only)
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_level: error
          checkstyle_config: checkstyle.xml
          level: warning
          workdir: .
        continue-on-error: true

      - name: PMD with reviewdog (new code only)
        uses: dbelyaev/action-pmd@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_level: error
          pmd_version: "6.55.0"
          ruleset: pmd.xml
          level: warning
          workdir: .
        continue-on-error: true

      - name: Count violations in changed files
        id: violations
        run: |
          CHECKSTYLE_COUNT=0
          PMD_COUNT=0
          
          CHANGED_FILES=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }} HEAD -- '*.java' || true)
          
          if [ -f "target/checkstyle-result.xml" ] && [ -n "$CHANGED_FILES" ]; then
            for FILE in $CHANGED_FILES; do
              if [ -f "$FILE" ]; then
                COUNT=$(grep -c "file=\".*$(basename $FILE)\"" target/checkstyle-result.xml 2>/dev/null || echo 0)
                CHECKSTYLE_COUNT=$((CHECKSTYLE_COUNT + COUNT))
              fi
            done
          fi
          
          if [ -f "target/pmd.xml" ] && [ -n "$CHANGED_FILES" ]; then
            for FILE in $CHANGED_FILES; do
              if [ -f "$FILE" ]; then
                COUNT=$(grep -c "file=\".*$(basename $FILE)\"" target/pmd.xml 2>/dev/null || echo 0)
                PMD_COUNT=$((PMD_COUNT + COUNT))
              fi
            done
          fi
          
          echo "checkstyle_violations=$CHECKSTYLE_COUNT" >> $GITHUB_OUTPUT
          echo "pmd_violations=$PMD_COUNT" >> $GITHUB_OUTPUT
          echo "total_violations=$((CHECKSTYLE_COUNT + PMD_COUNT))" >> $GITHUB_OUTPUT
          
          if [ $((CHECKSTYLE_COUNT + PMD_COUNT)) -gt 0 ]; then
            echo "::warning::Found $CHECKSTYLE_COUNT Checkstyle and $PMD_COUNT PMD violations in new code"
          fi

      - name: Post PR summary
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checkstyle = '${{ steps.violations.outputs.checkstyle_violations }}' || '0';
            const pmd = '${{ steps.violations.outputs.pmd_violations }}' || '0';
            const total = parseInt(checkstyle) + parseInt(pmd);
            
            let body = '## 🔍 Lint Results\n\n';
            
            if (total === 0) {
              body += '✅ **No new lint violations found in changed code!**\n\n';
            } else {
              body += '⚠️ **Found lint violations in new code:**\n\n';
              body += '| Linter | Violations |\n';
              body += '|--------|------------|\n';
              body += `| Checkstyle | ${checkstyle} |\n`;
              body += `| PMD | ${pmd} |\n`;
              body += '\n> 💡 Review the PR annotations above for details. Only violations in **new/changed code** are reported.\n';
            }
            
            body += '\n---\n';
            body += '_This check reports violations in new code only. Run `mvn checkstyle:check pmd:check` locally for full analysis._';
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## 🔍 Lint Results')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
